name: Generate Telegram RSS

on:
  schedule:
    # 08, 11, 14, 17, 20 МСК (UTC+3 → 05, 08, 11, 14, 17 UTC)
    # - cron: "0 5,8,11,14,17 * * *"
    - cron: "17 * * * *"  
  workflow_dispatch:

concurrency:  
  group: telegram-rss
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Start RSS-Bridge container
        run: |
          docker rm -f rss-bridge || true
          docker run -d --name rss-bridge -p 8080:80 \
            -v "${GITHUB_WORKSPACE}/config:/config" \
            rssbridge/rss-bridge

          READY=false
          for i in {1..20}; do
            if curl -sf http://localhost:8080/ > /dev/null; then
              READY=true
              echo "RSS-Bridge is ready"
              break
            fi
            echo "Waiting for RSS-Bridge... (${i}/20)"
            sleep 1
          done

          if [ "$READY" != "true" ]; then
            echo "RSS-Bridge failed to start"
            docker ps -a
            docker logs rss-bridge || true
            exit 1
          fi

          docker exec rss-bridge ls -la /config

      - name: Generate feeds from Telegram channels
        run: |
          mkdir -p out
          # очищаем лог ошибок на этот запуск
          : > out/_errors.log

          while read CHANNEL; do
          
            # пропускаем пустые строки и комментарии
            [[ -z "$CHANNEL" || "$CHANNEL" =~ ^# ]] && continue

            SAFE_NAME=$(echo "$CHANNEL" | tr -d '@')
            URL="http://localhost:8080/?action=display&bridge=Telegram&format=Atom&username=${CHANNEL}"
            TMP_FILE="out/${SAFE_NAME}.xml.tmp"

            echo "Fetching ${CHANNEL} -> out/${SAFE_NAME}.xml"

            success=false

            for attempt in 1 2; do
              if curl -fsS \
                   --max-time 30 \
                   -A "Mozilla/5.0 (compatible; TelegramRSSBot/1.0; +https://github.com/justSmK/telegram-rss)" \
                   "$URL" \
                   -o "$TMP_FILE"; then
                if [ -s "$TMP_FILE" ] \
                  && grep -Eq '<\?xml|<feed\b|<rss\b' "$TMP_FILE" \
                  && ! grep -Eq 'Bridge returned error|cURL error' "$TMP_FILE"; then
                  mv "$TMP_FILE" "out/${SAFE_NAME}.xml"
                  echo "OK: ${CHANNEL} (attempt ${attempt})"
                  success=true
                  break
                else
                  echo "INVALID: ${CHANNEL} (attempt ${attempt})" | tee -a out/_errors.log
                  rm -f "$TMP_FILE"
                fi
              else
                echo "FAIL: ${CHANNEL} (attempt ${attempt})" | tee -a out/_errors.log
                rm -f "$TMP_FILE"
                # небольшая пауза перед повтором
                sleep $((5 * attempt))
              fi
            done

            if [ "$success" = false ]; then
              echo "GIVE UP: ${CHANNEL} after 2 attempts" | tee -a out/_errors.log
            fi

            # лёгкий rate limit между каналами
            sleep 1
          done < channels.txt

      - name: Prepare Pages output
        run: |
          mkdir -p out
          cp index.html out/index.html
          cp style.css out/style.css
          cp channels.txt out/channels.txt

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

      - name: Deduplicate GitHub Pages artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          ARTIFACT_NAME: github-pages
        run: |
          set -euo pipefail

          artifacts_json=$(curl -fsS \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/artifacts?name=${ARTIFACT_NAME}&per_page=100")

          count=$(jq '.total_count' <<< "${artifacts_json}")
          if [ "${count}" -le 1 ]; then
            echo "Found ${count} ${ARTIFACT_NAME} artifact; nothing to deduplicate."
            exit 0
          fi

          missing_digest_count=$(jq '[.artifacts[] | select(.digest == null or .digest == "")] | length' <<< "${artifacts_json}")
          unique_payload_count=$(jq '[.artifacts[] | {digest, size_in_bytes}] | unique | length' <<< "${artifacts_json}")

          if [ "${missing_digest_count}" -ne 0 ] || [ "${unique_payload_count}" -ne 1 ]; then
            echo "Found ${count} ${ARTIFACT_NAME} artifacts, but they are not proven identical. Refusing to delete any artifact."
            jq -r '.artifacts[] | "id=\(.id) size=\(.size_in_bytes) digest=\(.digest // "missing") created_at=\(.created_at)"' <<< "${artifacts_json}"
            exit 1
          fi

          keep_id=$(jq -r '.artifacts | sort_by(.created_at) | reverse | .[0].id' <<< "${artifacts_json}")
          echo "Found ${count} identical ${ARTIFACT_NAME} artifacts; keeping artifact ${keep_id}."

          jq -r --argjson keep_id "${keep_id}" '.artifacts[] | select(.id != $keep_id) | .id' <<< "${artifacts_json}" | while read -r artifact_id; do
            echo "Deleting duplicate artifact ${artifact_id}."
            curl -fsS -X DELETE \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/actions/artifacts/${artifact_id}"
          done

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
