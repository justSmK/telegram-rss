name: Generate Telegram RSS

on:
  schedule:
    # 08, 11, 14, 17, 20 МСК (UTC+3 → 05, 08, 11, 14, 17 UTC)
    # - cron: "0 5,8,11,14,17 * * *"
    - cron: "17 * * * *"  
  workflow_dispatch:

concurrency:  
  group: telegram-rss
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Start RSS-Bridge container
        run: |
          docker rm -f rss-bridge || true
          docker run -d --name rss-bridge -p 8080:80 \
            -v "${GITHUB_WORKSPACE}/config:/config" \
            rssbridge/rss-bridge

          READY=false
          for i in {1..20}; do
            if curl -sf http://localhost:8080/ > /dev/null; then
              READY=true
              echo "RSS-Bridge is ready"
              break
            fi
            echo "Waiting for RSS-Bridge... (${i}/20)"
            sleep 1
          done

          if [ "$READY" != "true" ]; then
            echo "RSS-Bridge failed to start"
            docker ps -a
            docker logs rss-bridge || true
            exit 1
          fi

          docker exec rss-bridge ls -la /config

      - name: Generate feeds from Telegram channels
        run: |
          mkdir -p out
          # очищаем лог ошибок на этот запуск
          : > out/_errors.log
          : > out/_filtered.log

          while read CHANNEL; do
          
            # пропускаем пустые строки и комментарии
            [[ -z "$CHANNEL" || "$CHANNEL" =~ ^# ]] && continue

            SAFE_NAME=$(echo "$CHANNEL" | tr -d '@')
            URL="http://localhost:8080/?action=display&bridge=Telegram&format=Atom&username=${CHANNEL}"
            TMP_FILE="out/${SAFE_NAME}.xml.tmp"

            echo "Fetching ${CHANNEL} -> out/${SAFE_NAME}.xml"

            success=false

            for attempt in 1 2; do
              if curl -fsS \
                   --max-time 30 \
                   -A "Mozilla/5.0 (compatible; TelegramRSSBot/1.0; +https://github.com/justSmK/telegram-rss)" \
                   "$URL" \
                   -o "$TMP_FILE"; then
                if [ -s "$TMP_FILE" ] \
                  && grep -Eq '<\?xml|<feed\b|<rss\b' "$TMP_FILE" \
                  && ! grep -Eq 'Bridge returned error|cURL error' "$TMP_FILE"; then
                  if python3 scripts/filter_feed.py \
                       "$TMP_FILE" \
                       "out/${SAFE_NAME}.xml" \
                       --channel "$CHANNEL" \
                       --config config/ad_filters.toml \
                       --log out/_filtered.log; then
                    rm -f "$TMP_FILE"
                    echo "OK: ${CHANNEL} (attempt ${attempt})"
                    success=true
                    break
                  else
                    echo "FILTER_FAIL: ${CHANNEL} (attempt ${attempt})" | tee -a out/_errors.log
                    rm -f "$TMP_FILE"
                  fi
                else
                  echo "INVALID: ${CHANNEL} (attempt ${attempt})" | tee -a out/_errors.log
                  rm -f "$TMP_FILE"
                fi
              else
                echo "FAIL: ${CHANNEL} (attempt ${attempt})" | tee -a out/_errors.log
                rm -f "$TMP_FILE"
                # небольшая пауза перед повтором
                sleep $((5 * attempt))
              fi
            done

            if [ "$success" = false ]; then
              echo "GIVE UP: ${CHANNEL} after 2 attempts" | tee -a out/_errors.log
            fi

            # лёгкий rate limit между каналами
            sleep 1
          done < channels.txt

      - name: Prepare Pages output
        run: |
          mkdir -p out
          cp index.html out/index.html
          cp style.css out/style.css
          cp channels.txt out/channels.txt

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

      - name: Deduplicate GitHub Pages artifacts
        uses: actions/github-script@v9
        env:
          ARTIFACT_NAME: github-pages
          GITHUB_API_VERSION: "2026-03-10"
        with:
          github-token: ${{ github.token }}
          retries: 3
          script: |
            const artifactName = process.env.ARTIFACT_NAME;
            const runId = Number(process.env.GITHUB_RUN_ID);
            const requestHeaders = {
              "X-GitHub-Api-Version": process.env.GITHUB_API_VERSION,
            };
            const { owner, repo } = context.repo;

            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner,
              repo,
              run_id: runId,
              name: artifactName,
              per_page: 100,
              headers: requestHeaders,
            });

            const matchingArtifacts = artifacts.filter((artifact) => artifact.name === artifactName);
            if (matchingArtifacts.length <= 1) {
              core.info(`Found ${matchingArtifacts.length} ${artifactName} artifact; nothing to deduplicate.`);
              return;
            }

            const artifactDetails = matchingArtifacts
              .map((artifact) => `id=${artifact.id} size=${artifact.size_in_bytes} digest=${artifact.digest ?? "missing"} created_at=${artifact.created_at}`)
              .join("\n");
            const missingDigestCount = matchingArtifacts.filter((artifact) => !artifact.digest).length;
            const uniquePayloadCount = new Set(
              matchingArtifacts.map((artifact) => `${artifact.digest}\u0000${artifact.size_in_bytes}`)
            ).size;

            if (missingDigestCount !== 0 || uniquePayloadCount !== 1) {
              throw new Error(
                `Found ${matchingArtifacts.length} ${artifactName} artifacts, but they are not proven identical. Refusing to delete any artifact.\n${artifactDetails}`
              );
            }

            const [artifactToKeep] = [...matchingArtifacts].sort((left, right) => {
              return new Date(right.created_at).getTime() - new Date(left.created_at).getTime() || right.id - left.id;
            });
            core.info(`Found ${matchingArtifacts.length} identical ${artifactName} artifacts; keeping artifact ${artifactToKeep.id}.`);

            for (const artifact of matchingArtifacts) {
              if (artifact.id === artifactToKeep.id) {
                continue;
              }

              core.info(`Deleting duplicate artifact ${artifact.id}.`);
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
                headers: requestHeaders,
              });
            }

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
