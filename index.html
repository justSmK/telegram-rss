<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Telegram → RSS feeds</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Telegram → RSS</h1>
  <div class="meta" id="meta">Loading…</div>

  <div class="feeds" id="feeds"></div>
  <div id="errors"></div>

  <script>
    const STORAGE_KEY = 'telegramRssState';

    // ---- Relative time formatting ----
    function formatRelativeTime(date) {
      const now = new Date();
      const diffMs = now - date;
      const diffSec = Math.floor(diffMs / 1000);
      const diffMin = Math.floor(diffSec / 60);
      const diffHours = Math.floor(diffMin / 60);
      const diffDays = Math.floor(diffHours / 24);

      if (diffMin < 1) return 'just now';
      if (diffMin < 60) return `${diffMin} minute${diffMin === 1 ? '' : 's'} ago`;
      if (diffHours < 24) return `${diffHours} hour${diffHours === 1 ? '' : 's'} ago`;
      if (diffDays < 30) return `${diffDays} day${diffDays === 1 ? '' : 's'} ago`;
      return 'more than 30 days ago';
    }

    function parseValidDate(value) {
      if (!value) return null;
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function normalizeChannels(channels) {
      return Array.isArray(channels)
        ? channels
            .filter(channel => typeof channel === 'string')
            .map(channel => channel.trim())
            .filter(channel => channel.length > 0)
        : [];
    }

    function loadSavedState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
      } catch {
        return null;
      }
    }

    function saveAcknowledgedState(channels) {
      const normalizedChannels = normalizeChannels(channels);
      const acknowledgedSignature = normalizedChannels.join('\n');

      try {
        localStorage.setItem(
          STORAGE_KEY,
          JSON.stringify({
            acknowledgedChannels: normalizedChannels,
            acknowledgedSignature,
          })
        );
      } catch (e) {
        console.warn('Failed to save state to localStorage', e);
      }

      return {
        acknowledgedChannels: normalizedChannels,
        acknowledgedSignature,
      };
    }

    function createFeedCard(item) {
      const cardClasses = ['feed'];
      if (item.isNew) cardClasses.push('feed-new');
      if (item.isRemoved) cardClasses.push('feed-removed');

      const feedDiv = document.createElement('div');
      feedDiv.className = cardClasses.join(' ');

      const mainDiv = document.createElement('div');
      mainDiv.className = 'feed-main';

      const titleRow = document.createElement('div');
      titleRow.className = 'feed-title-row';

      const nameDiv = document.createElement('div');
      nameDiv.className = 'feed-name';
      nameDiv.textContent = item.channel;

      titleRow.appendChild(nameDiv);

      if (item.isNew) {
        const badge = document.createElement('span');
        badge.className = 'feed-badge';
        badge.textContent = 'New';
        titleRow.appendChild(badge);
      }

      if (item.isRemoved) {
        const badge = document.createElement('span');
        badge.className = 'feed-badge feed-badge-removed';
        badge.textContent = 'Removed';
        titleRow.appendChild(badge);
      }

      const detailsDiv = document.createElement('div');
      detailsDiv.className = item.isRemoved ? 'feed-status' : 'feed-url';
      detailsDiv.textContent = item.isRemoved
        ? 'This channel was in your last acknowledged list, but is no longer in channels.txt.'
        : item.feedUrl;

      mainDiv.appendChild(titleRow);
      mainDiv.appendChild(detailsDiv);

      if (!item.isRemoved) {
        const buttonsDiv = document.createElement('div');
        buttonsDiv.className = 'buttons';

        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.textContent = 'Copy URL';
        copyBtn.dataset.url = item.feedUrl;

        buttonsDiv.appendChild(copyBtn);

        feedDiv.appendChild(mainDiv);
        feedDiv.appendChild(buttonsDiv);
      } else {
        feedDiv.appendChild(mainDiv);
      }

      return feedDiv;
    }

    function createFeedsSection(title, subtitle, items, options = {}) {
      const { tone = 'default', action = null } = options;
      const section = document.createElement('section');
      const sectionClasses = ['feed-section'];
      if (tone === 'new') sectionClasses.push('feed-section-new');
      if (tone === 'removed') sectionClasses.push('feed-section-removed');
      section.className = sectionClasses.join(' ');

      const header = document.createElement('div');
      header.className = 'feed-section-header';

      const headingRow = document.createElement('div');
      headingRow.className = 'feed-section-heading-row';

      const titleEl = document.createElement('h2');
      titleEl.className = 'feed-section-title';
      titleEl.textContent = title;

      headingRow.appendChild(titleEl);

      if (action) {
        headingRow.appendChild(action);
      }

      header.appendChild(headingRow);

      if (subtitle) {
        const subtitleEl = document.createElement('p');
        subtitleEl.className = 'feed-section-subtitle';
        subtitleEl.textContent = subtitle;
        header.appendChild(subtitleEl);
      }

      const list = document.createElement('div');
      list.className = 'feed-section-list';

      for (const item of items) {
        list.appendChild(createFeedCard(item));
      }

      section.appendChild(header);
      section.appendChild(list);

      return section;
    }

    function renderFeeds(feedsEl, items, onAcknowledgeNew) {
      feedsEl.innerHTML = '';

      const sortedItems = [...items].sort((a, b) => a.channel.localeCompare(b.channel));
      const newItems = sortedItems.filter(item => item.isNew);
      const removedItems = sortedItems.filter(item => item.isRemoved);
      const existingItems = sortedItems.filter(item => !item.isNew && !item.isRemoved);

      if (newItems.length > 0) {
        const acknowledgeButton = document.createElement('button');
        acknowledgeButton.className = 'section-btn';
        acknowledgeButton.textContent = 'Mark changes as seen';
        acknowledgeButton.addEventListener('click', onAcknowledgeNew);

        feedsEl.appendChild(
          createFeedsSection(
            `New channels (${newItems.length})`,
            'These stay here until you explicitly mark changes as seen.',
            newItems,
            {
              tone: 'new',
              action: acknowledgeButton,
            }
          )
        );
      }

      if (removedItems.length > 0) {
        const acknowledgeButton = document.createElement('button');
        acknowledgeButton.className = 'section-btn section-btn-danger';
        acknowledgeButton.textContent = 'Mark changes as seen';
        acknowledgeButton.addEventListener('click', onAcknowledgeNew);

        feedsEl.appendChild(
          createFeedsSection(
            `Removed channels (${removedItems.length})`,
            'These were present in your last acknowledged list and have now been removed.',
            removedItems,
            {
              tone: 'removed',
              action: acknowledgeButton,
            }
          )
        );
      }

      if (existingItems.length > 0 || (newItems.length === 0 && removedItems.length === 0)) {
        feedsEl.appendChild(
          createFeedsSection(
            newItems.length > 0 || removedItems.length > 0 ? 'Current channels' : 'All channels',
            newItems.length > 0 || removedItems.length > 0 ? 'The current active feed list.' : '',
            existingItems
          )
        );
      }
    }

    // ---- Main loader ----
    async function loadFeeds() {
      const metaEl = document.getElementById('meta');
      const feedsEl = document.getElementById('feeds');
      const errorsEl = document.getElementById('errors');

      // load localStorage state
      const saved = loadSavedState();

      try {
        const resp = await fetch('channels.txt');
        if (!resp.ok) throw new Error('Failed to load channels.txt');

        const text = await resp.text();
        const lines = text
          .split('\n')
          .map(l => l.trim())
          .filter(l => l.length > 0 && !l.startsWith('#'));

        const hasAcknowledgedState =
          Array.isArray(saved?.acknowledgedChannels) || Array.isArray(saved?.channels);

        let acknowledgedChannels = normalizeChannels(saved?.acknowledgedChannels);

        // Migrate the previous storage format where current channels were saved on load.
        if (acknowledgedChannels.length === 0 && Array.isArray(saved?.channels)) {
          acknowledgedChannels = normalizeChannels(saved.channels);
        }

        if (!hasAcknowledgedState) {
          const persistedState = saveAcknowledgedState(lines);
          acknowledgedChannels = persistedState.acknowledgedChannels;
        }

        const acknowledgedSet = new Set(acknowledgedChannels);

        const lastModifiedDate =
          parseValidDate(resp.headers.get('last-modified')) ||
          parseValidDate(document.lastModified);

        if (lastModifiedDate) {
          const relative = formatRelativeTime(lastModifiedDate);
          const absolute = lastModifiedDate.toLocaleString();
          metaEl.textContent = `Channels: ${lines.length} · Updated ${relative} (${absolute})`;
        } else {
          metaEl.textContent = `Channels: ${lines.length}`;
        }

        errorsEl.innerHTML = '';

        // Build items with new-channel detection
        const items = lines.map(channel => {
          const isNewChannel = !acknowledgedSet.has(channel);
          const safe = channel.replace('@', '');
          const basePath =
            window.location.origin +
            window.location.pathname.replace(/\/[^\/]*$/, '');
          const feedUrl = `${basePath}/${safe}.xml`;

          return { channel, safe, feedUrl, isNew: isNewChannel };
        });

        const currentSet = new Set(lines);
        const removedItems = acknowledgedChannels
          .filter(channel => !currentSet.has(channel))
          .map(channel => ({
            channel,
            isRemoved: true,
          }));

        renderFeeds(feedsEl, [...items, ...removedItems], () => {
          saveAcknowledgedState(lines);
          renderFeeds(
            feedsEl,
            items.map(item => ({ ...item, isNew: false })),
            null
          );
        });

        // ---- Errors block ----
        try {
          const errResp = await fetch('_errors.log');
          if (errResp.ok) {
            const errText = await errResp.text();
            if (errText.trim().length > 0) {
              const box = document.createElement('div');
              box.className = 'error-box';
              box.innerHTML = `
                <div><strong>Some channels failed to update in the last run.</strong></div>
                <pre>${errText.replace(/[&<>]/g, c => (
                  {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]
                ))}</pre>
              `;
              errorsEl.appendChild(box);
            }
          }
        } catch (e) {
          console.warn('Failed to load _errors.log', e);
        }

      } catch (e) {
        console.error(e);
        metaEl.textContent = 'Failed to load channels.';
      }
    }

    // ---- Copy button handler ----
    document.addEventListener('click', async (event) => {
      const btn = event.target.closest('.copy-btn');
      if (!btn) return;

      const url = btn.dataset.url;
      if (!url) return;

      try {
        await navigator.clipboard.writeText(url);
        const original = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = original; }, 1200);
      } catch (e) {
        console.error(e);
        alert('Failed to copy. You can copy the URL manually.');
      }
    });

    loadFeeds();
  </script>
</body>
</html>
